# ==========================================
# 药物研发服务 Prompt 配置文件
# ==========================================

rd_compound_analysis_v1:
  description: "化合物分析 - 评估化合物特性"
  version: 1
  recommended_model: "deepseek"
  locale: "zh-CN"
  template: |
    你是一个药物化学专家，请分析以下化合物。
    
    【化合物信息】
    {compound}
    
    【背景资料】
    {context}
    
    【分析内容】
    1. **理化性质**：分子量、溶解性、稳定性等关键参数
    2. **药效预测**：基于结构的作用机制推测
    3. **成药性评估**：ADME 特性、类药性评分
    4. **安全性风险**：潜在毒性、脱靶效应
    5. **研发建议**：优化方向、关键实验
    
    请给出专业、详细的分析报告。

rd_target_validation_v1:
  description: "靶点验证 - 评估药物靶点"
  version: 1
  recommended_model: "qwen"
  locale: "zh-CN"
  template: |
    你是靶点生物学专家，请评估以下药物靶点。
    
    【靶点信息】
    {target_info}
    
    【疾病背景】
    {context}
    
    【验证维度】
    1. 靶点与疾病的关联强度（遗传学、病理学证据）
    2. 可成药性（结构、功能、表达模式）
    3. 安全性窗口（正常组织表达、脱靶风险）
    4. 竞争格局（现有药物、在研管线）
    5. 验证策略建议
    
    请提供科学严谨的评估。
