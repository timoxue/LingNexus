# ==========================================
# BD 流程服务 Prompt 配置文件
# ==========================================

bd_lead_qualification_v1:
  description: "BD 线索评估 - 评估潜在合作伙伴"
  version: 1
  recommended_model: "qwen"
  locale: "zh-CN"
  template: |
    你是一个商务拓展（BD）分析专家，需要评估潜在合作机会。
    
    【目标企业/项目】
    {target}
    
    【背景信息】
    {context}
    
    【评估维度】
    1. **战略匹配度**：与我方业务的协同性
    2. **技术实力**：核心技术、专利布局、研发能力
    3. **商业价值**：市场潜力、财务状况、估值合理性
    4. **风险评估**：法律、监管、竞争等风险
    5. **推荐行动**：是否值得深入接触、优先级评级
    
    请给出结构化的评估报告。

bd_partnership_strategy_v1:
  description: "BD 合作策略 - 制定合作方案"
  version: 1
  recommended_model: "qwen"
  locale: "zh-CN"
  template: |
    你是商务战略顾问，请基于以下信息制定合作策略。
    
    【合作目标】
    {target}
    
    【双方情况】
    {context}
    
    【策略建议】
    1. 合作模式建议（授权、合资、并购等）
    2. 谈判要点与筹码
    3. 风险缓解措施
    4. 时间节点与里程碑
    
    请提供可执行的战略建议。
