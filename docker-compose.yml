name: lingnexus

services:
  gateway:
    image: lingnexus:latest
    container_name: lingnexus-gateway
    restart: unless-stopped
    user: root  # 需要 root 权限安装依赖，启动脚本会切换到 node 用户
    ports:
      - "18789:18789"
    volumes:
      - type: bind
        source: .
        target: /workspace
        read_only: false  # Allow write access for blackboard data
      - openclaw-state:/home/node/.openclaw
    environment:
      # ── Anthropic: Claude Code 订阅凭证 ──────────────────
      ANTHROPIC_OAUTH_TOKEN: ${ANTHROPIC_OAUTH_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_OAUTH_TOKEN}
      ANTHROPIC_BASE_URL: http://host.docker.internal:18790
      # ── 第三方模型 ─────────────────────────────────────────
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # ── 医疗数据库 API ─────────────────────────────────────
      NCBI_EMAIL: ${NCBI_EMAIL:-}
      # ── 飞书 Bot 配置 ──────────────────────────────────────
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      # ── 运行时配置 ─────────────────────────────────────────
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:-}
      OPENCLAW_LOG_LEVEL: ${OPENCLAW_LOG_LEVEL:-info}
      NODE_ENV: production
    # 使用自定义启动脚本（已包含 Xvfb 和 OpenClaw Gateway）
    command: ["/usr/local/bin/start-lingnexus.sh"]
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      start_period: 60s  # 增加启动时间，因为需要安装 Python 依赖
      retries: 3

  setup:
    image: lingnexus:latest
    container_name: lingnexus-setup
    profiles: ["setup"]
    user: root  # 需要 root 权限安装依赖
    volumes:
      - type: bind
        source: .
        target: /workspace
        read_only: false  # Allow write access for agent registration
      - openclaw-state:/home/node/.openclaw
    environment:
      # ── Anthropic: Claude Code 订阅凭证 ──────────────────
      ANTHROPIC_OAUTH_TOKEN: ${ANTHROPIC_OAUTH_TOKEN}
      ANTHROPIC_API_KEY: ${ANTHROPIC_OAUTH_TOKEN}
      ANTHROPIC_BASE_URL: http://host.docker.internal:18790
      # ── 第三方模型 ─────────────────────────────────────────
      MOONSHOT_API_KEY: ${MOONSHOT_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # ── 医疗数据库 API ─────────────────────────────────────
      NCBI_EMAIL: ${NCBI_EMAIL:-}
      # ── Agent 模型分配 ─────────────────────────────────────
      OPENCLAW_LOG_LEVEL: ${OPENCLAW_LOG_LEVEL:-info}
      MODEL_MAIN: ${MODEL_MAIN:-claude-haiku-4-5-20251001}
      MODEL_COACH: ${MODEL_COACH:-kimi-coding/kimi-k2-thinking}
      MODEL_INVESTIGATOR: ${MODEL_INVESTIGATOR:-google/gemini-2.5-flash}
      MODEL_VALIDATOR: ${MODEL_VALIDATOR:-claude-sonnet-4-6}
      MODEL_DEDUPLICATOR: ${MODEL_DEDUPLICATOR:-openrouter/qwen/qwen3.5-27b}
    entrypoint: /bin/bash
    command: >
      -c "
      echo '🔧 初始化 Python 环境...' &&
      bash /workspace/scripts/install-python-deps.sh &&
      echo '📝 注册 Agents...' &&
      bash /workspace/scripts/register-agents.sh
      "

  # Anthropic API 代理服务（Node.js）
  anthropic-proxy:
    image: node:24-slim
    container_name: lingnexus-anthropic-proxy
    restart: unless-stopped
    ports:
      - "18790:18790"
    volumes:
      - ./proxy-server.js:/app/proxy-server.js:ro
    working_dir: /app
    command: ["node", "proxy-server.js"]
    networks:
      - default

volumes:
  openclaw-state:
    name: lingnexus-openclaw-state
